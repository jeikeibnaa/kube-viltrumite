# Tool compatibility database entry for cert-manager.
#
# Schema:
#   tool: string                          — canonical tool name
#   versions[]:
#     version: string                     — semver minor (e.g. "1.12")
#     min_kubernetes: string              — earliest k8s minor that supports this version
#     incompatible_with:                  — map of tool → list of known-bad version ranges
#       <tool-name>: [string]
#     breaking_changes[]:
#       description: string               — human-readable summary
#       type: string                      — api_removal | crd_migration | config_change | behaviour_change
#     risk_level: string                  — low | medium | high
#     upgrade_notes: string               — operator guidance when upgrading from previous minor

tool: cert-manager
versions:
  - version: "1.12"
    min_kubernetes: "1.22"
    incompatible_with:
      ingress-nginx:
        - "1.3.0"   # webhook timeout race; fixed in 1.3.1+
        - "1.3.1"   # cert-manager annotation parsing regression
      external-secrets: []
    breaking_changes:
      - description: "cert-manager.io/v1alpha2 and v1alpha3 API versions removed from CRDs"
        type: api_removal
      - description: "cmctl CLI flag --kubeconfig-context renamed to --context"
        type: config_change
    risk_level: medium
    upgrade_notes: >
      Run `cmctl upgrade migrate-api-version` before upgrading from 1.11 to convert
      any remaining v1alpha2/v1alpha3 resources to v1. Validate webhook connectivity
      with ingress-nginx >= 1.4.0.

  - version: "1.13"
    min_kubernetes: "1.23"
    incompatible_with:
      ingress-nginx:
        - "1.4.0"   # IngressClass race condition with cert-manager challenge solver
      external-secrets:
        - "0.7.0"   # ESO ClusterSecretStore CRD field conflict introduced in this release
        - "0.7.1"
    breaking_changes:
      - description: "Kubernetes 1.22 support dropped"
        type: behaviour_change
      - description: "Removed --acme-http01-solver-nameservers flag (use --dns01-recursive-nameservers)"
        type: config_change
    risk_level: low
    upgrade_notes: >
      Verify cluster is running Kubernetes >= 1.23 before upgrading.
      Replace --acme-http01-solver-nameservers in operator args with
      --dns01-recursive-nameservers if present.

  - version: "1.14"
    min_kubernetes: "1.23"
    incompatible_with:
      ingress-nginx: []
      external-secrets:
        - "0.8.0"   # ExternalSecret status condition schema changed; causes watch errors
    breaking_changes:
      - description: "Gateway API v1 (stable) required; experimental v1alpha2 route support removed"
        type: api_removal
      - description: "Certificate additionalOutputFormats field promoted to GA; alpha gate removed"
        type: config_change
    risk_level: low
    upgrade_notes: >
      If using Gateway API, upgrade gateway-api CRDs to v1.0+ before this cert-manager version.
      The feature gate --enable-gateway-api is now on by default; remove it from operator args
      to avoid deprecation warnings.

  - version: "1.15"
    min_kubernetes: "1.25"
    incompatible_with:
      ingress-nginx:
        - "1.9.0"   # Ingress status patch conflict when cert-manager manages TLS secret rotation
      external-secrets:
        - "0.9.0"   # PushSecret webhook validation rejects cert-manager-owned secrets
        - "0.9.1"
    breaking_changes:
      - description: "Kubernetes 1.23 and 1.24 support dropped"
        type: behaviour_change
      - description: "Removed long-deprecated --controllers flag; use --enable-certificate-owner-ref"
        type: config_change
      - description: >
          CertificateRequest.spec.duration field now strictly validated;
          values below 1h are rejected
        type: behaviour_change
    risk_level: high
    upgrade_notes: >
      Requires Kubernetes >= 1.25. Audit all CertificateRequests for sub-1h duration values
      before upgrading — invalid resources will be rejected and may block issuance.
      Remove --controllers from operator Deployment args if present.
      Upgrade ingress-nginx to >= 1.10.0 and external-secrets to >= 0.9.2 first.
