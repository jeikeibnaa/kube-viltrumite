# Tool compatibility database entry for external-secrets (External Secrets Operator).
#
# Schema:
#   tool: string                          — canonical tool name
#   versions[]:
#     version: string                     — semver version string
#     min_kubernetes: string              — earliest k8s minor that supports this version
#     incompatible_with:                  — map of tool → list of known-bad version ranges
#       <tool-name>: [string]
#     breaking_changes[]:
#       description: string               — human-readable summary
#       type: string                      — api_removal | crd_migration | config_change | behaviour_change
#     risk_level: string                  — low | medium | high
#     upgrade_notes: string               — operator guidance when upgrading from previous version

tool: external-secrets
versions:
  - version: "0.8.0"
    min_kubernetes: "1.19"
    incompatible_with:
      cert-manager:
        - "1.14"   # ExternalSecret status condition schema changed; causes watch errors
      vault: []
    breaking_changes:
      - description: "ExternalSecret v1alpha1 API version removed; v1beta1 is now the minimum"
        type: api_removal
      - description: "SecretStore .spec.provider field restructured; inline provider config no longer accepted"
        type: config_change
      - description: "ClusterSecretStore finalizer name changed; old finalizers must be removed manually before upgrade"
        type: behaviour_change
    risk_level: high
    upgrade_notes: >
      Migrate all ExternalSecret resources from v1alpha1 to v1beta1 before upgrading.
      Remove stale ClusterSecretStore finalizers with
      `kubectl patch clustersecretstore <name> -p '{"metadata":{"finalizers":[]}}' --type=merge`.
      Validate SecretStore provider configs match the new nested structure.

  - version: "0.9.0"
    min_kubernetes: "1.19"
    incompatible_with:
      cert-manager:
        - "1.15"   # PushSecret webhook validation rejects cert-manager-owned secrets
        - "1.15.1"
      vault: []
    breaking_changes:
      - description: "SecretStore API store reference field renamed from storeRef to secretStoreRef across all resources"
        type: api_removal
      - description: "PushSecret resource introduced as GA; experimental PushSecret alpha CRD must be removed before upgrade"
        type: crd_migration
      - description: "ESO controller flag --store-error-condition renamed to --secret-store-error-conditions"
        type: config_change
    risk_level: high
    upgrade_notes: >
      Patch all ExternalSecret and ClusterExternalSecret manifests to rename .spec.storeRef
      to .spec.secretStoreRef before applying. Remove the alpha PushSecret CRD if installed:
      `kubectl delete crd pushsecrets.external-secrets.io`. Re-install to pick up the GA CRD.
      Update operator Deployment args to replace --store-error-condition.

  - version: "0.9.5"
    min_kubernetes: "1.19"
    incompatible_with:
      cert-manager: []
      vault: []
    breaking_changes: []
    risk_level: low
    upgrade_notes: >
      Patch release. No breaking changes from 0.9.x. Review the changelog for bug fixes
      to webhook validation that may change previously-accepted invalid resources.

  - version: "0.10.0"
    min_kubernetes: "1.22"
    incompatible_with:
      cert-manager:
        - "1.12"   # cert-manager 1.12 ClusterIssuer annotation conflicts with ESO 0.10 ownership labels
      vault:
        - "0.24.0"  # Vault agent injector sidecar conflicts with ESO token refresh on Kubernetes auth
    breaking_changes:
      - description: "ClusterSecretStore .spec.conditions field removed; replace with .spec.namespaceSelector"
        type: api_removal
      - description: "Kubernetes 1.19, 1.20, 1.21 support dropped"
        type: behaviour_change
      - description: "ESO webhook now enforces immutable .spec.refreshInterval; changes require resource recreation"
        type: behaviour_change
    risk_level: medium
    upgrade_notes: >
      Requires Kubernetes >= 1.22. Migrate ClusterSecretStore manifests to replace
      .spec.conditions with .spec.namespaceSelector before upgrading.
      Audit all ExternalSecret resources for .spec.refreshInterval mutations — recreate
      any that changed this field after initial creation.
      Upgrade Vault helm chart to >= 0.25.0 before deploying this ESO version.

  - version: "0.10.5"
    min_kubernetes: "1.22"
    incompatible_with:
      cert-manager: []
      vault: []
    breaking_changes: []
    risk_level: low
    upgrade_notes: >
      Patch release on the 0.10.x line. No breaking changes from 0.10.x.
      Contains fixes for ClusterSecretStore namespace selector edge cases introduced in 0.10.0.
